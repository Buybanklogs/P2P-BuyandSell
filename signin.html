<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>SFPF Global – Sign In</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" href="/assets/logo.png" sizes="any">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconify -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <style>
    :root { --brand: #FEFD0C; }
    html { -webkit-text-size-adjust: 100%; } /* avoid auto-zoom tweaks */
    body {
      background: #000;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    /* Core input styles */
    .input-base{
      width:100%;
      background-color:rgba(0,0,0,0.4);
      border:1px solid #1f2937; /* gray-800 */
      color:#fff;
      border-radius:0.75rem;
      padding:0.75rem 1rem 0.75rem 2.5rem;
      font-size:1rem;            /* 16px to prevent iOS zoom */
      line-height:1.5;           /* comfortable tap targets */
      transition:all .2s;
      outline:none;
    }
    .input-base::placeholder{color:#6b7280}
    .input-base:focus{background-color:rgba(0,0,0,0.6); box-shadow:0 0 0 1px var(--brand)}

    /* Extra safety for iOS Safari */
    @supports (-webkit-touch-callout: none) {
      input, select, textarea { font-size:16px !important; }
    }

    /* If you prefer to only force 16px on small screens: */
    @media (max-width: 640px){
      .input-base { font-size:16px; }
    }
  </style>

<body>
  <div class="min-h-screen w-full flex items-center justify-center py-10 px-2">
    <div class="w-full max-w-md">

      <!-- Security Badge -->
      <div class="flex justify-center mb-6">
        <div class="bg-black/60 backdrop-blur-sm rounded-full px-4 py-2 flex items-center gap-2">
          <iconify-icon icon="lucide:shield" class="w-4 h-4" style="color:var(--brand)"></iconify-icon>
          <span class="text-xs font-medium tracking-wide" style="color:var(--brand)">SECURE LOGIN</span>
        </div>
      </div>

      <!-- Card -->
      <div class="rounded-2xl shadow-2xl border border-black/10 bg-gradient-to-br from-black/75 to-black/60 backdrop-blur-md p-8">
        <!-- Header -->
        <div class="text-center mb-8">
          <h1 class="text-3xl font-extrabold text-white mb-1">
            Welcome <span style="color:var(--brand)">Back</span>
          </h1>
          <p class="text-gray-300/90 text-sm">Sign in to access your account</p>
        </div>

        <!-- Alerts -->
        <div id="alert-success" class="hidden bg-green-500/10 border border-green-500/30 text-green-400 px-4 py-3 rounded-lg mb-4 flex items-center gap-3" role="alert">
          <iconify-icon icon="lucide:check-circle-2" class="h-4 w-4"></iconify-icon>
          <span class="text-sm" id="alert-success-text">Login successful! Redirecting...</span>
        </div>
        <div id="alert-error" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-lg mb-4 flex items-center gap-3" role="alert">
          <iconify-icon icon="lucide:alert-circle" class="h-4 w-4"></iconify-icon>
          <span class="text-sm" id="alert-error-text"></span>
        </div>

        <!-- FORM -->
        <form id="login-form" class="space-y-5" method="post" action="auth/login.php" novalidate="">
          <!-- Email -->
          <div class="space-y-2">
            <label for="email" class="block text-sm font-medium text-white">
              Email Address <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <iconify-icon icon="lucide:mail" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></iconify-icon>
              <input id="email" name="email" type="email" inputmode="email" placeholder="Enter your email" autocomplete="email" required="" class="input-base pr-4">
            </div>
            <p id="email-error" class="hidden text-red-400 text-xs flex items-center gap-1">
              <iconify-icon icon="lucide:alert-circle" class="w-3 h-3"></iconify-icon>
              <span></span>
            </p>
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label for="password" class="block text-sm font-medium text-white">
              Password <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <iconify-icon icon="lucide:lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></iconify-icon>
              <input id="password" name="password" type="password" inputmode="text" placeholder="Enter your password" autocomplete="current-password" required="" class="input-base pr-10">
              <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[color:var(--brand)] transition-colors">
                <iconify-icon id="toggle-password-icon" icon="lucide:eye" class="w-4 h-4"></iconify-icon>
              </button>
            </div>
            <p id="password-error" class="hidden text-red-400 text-xs flex items-center gap-1">
              <iconify-icon icon="lucide:alert-circle" class="w-3 h-3"></iconify-icon>
              <span></span>
            </p>
          </div>

          <!-- Remember / Forgot -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-3 select-none">
              <input id="remember" name="remember" type="checkbox" class="w-4 h-4 text-[color:var(--brand)] bg-black/40 border-gray-700 rounded focus:ring-[color:var(--brand)]/20 focus:ring-2 focus:ring-offset-0">
              <span class="text-sm text-gray-300">Remember me</span>
            </label>
            <button type="button" id="btn-forgot" class="text-sm underline underline-offset-2 font-medium hover:opacity-80" style="color:var(--brand)">
              Forgot Password?
            </button>
          </div>

          <!-- Submit -->
          <button id="btn-submit" type="submit" class="w-full py-3 px-4 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2 bg-gray-700 text-gray-400 cursor-not-allowed" disabled="">
            <span id="btn-spinner" class="hidden animate-spin rounded-full h-4 w-4 border-2 border-gray-400 border-t-transparent"></span>
            <iconify-icon id="btn-lock" icon="lucide:lock" class="w-4 h-4"></iconify-icon>
            <span id="btn-text">Sign In</span>
          </button>

          <!-- Signup -->
          <div class="text-center pt-4 border-t border-white/10">
            <p class="text-gray-300 text-sm">
              Don’t have an account?
              <a href="/signup.html" class="font-semibold underline underline-offset-2 hover:opacity-80" style="color:var(--brand)">Sign Up</a>
            </p>
          </div>
        </form>

        <!-- Footer line -->
        <div class="text-center mt-6">
          <p class="text-gray-400 text-xs">Protected by industry-standard encryption</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---------- Utilities ----------
    const $ = (s)=>document.querySelector(s);
    const isValidEmail = (e)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
    const getErrors = (email, password) => {
      const errors = {};
      if (!email.trim()) errors.email = "Email is required";
      else if (!isValidEmail(email)) errors.email = "Please enter a valid email address";
      if (!password.trim()) errors.password = "Password is required";
      return errors;
    };

    // Persistent storage helpers for "Remember me"
    const STORAGE = (() => {
      try { const t="__test__"; localStorage.setItem(t,t); localStorage.removeItem(t); return localStorage; }
      catch { return null; }
    })();
    const LS_REMEMBER = "sfpfg_remember";
    const LS_EMAIL    = "sfpfg_email";

    // ---------- Elements ----------
    const elForm = $("#login-form");
    const elEmail = $("#email");
    const elPass  = $("#password");
    const elRemember = $("#remember");
    const elForgot = $("#btn-forgot");

    const elErrEmail = $("#email-error");
    const elErrEmailText = $("#email-error span");
    const elErrPass  = $("#password-error");
    theEmailErrorText = null;
    const elErrPassText = $("#password-error span");

    const elAlertSuccess = $("#alert-success");
    const elAlertSuccessText = $("#alert-success-text");
    const elAlertError = $("#alert-error");
    const elAlertErrorText = $("#alert-error-text");

    const elBtn = $("#btn-submit");
    const elBtnText = $("#btn-text");
    const elBtnSpinner = $("#btn-spinner");
    const elBtnLock = $("#btn-lock");

    const elTogglePass = $("#toggle-password");
    const elToggleIcon = $("#toggle-password-icon");

    let showPassword=false, isLoading=false;

    // Track interaction so errors only show after user touches fields
    const touched = { email: false, password: false };

    // ---------- UI helpers ----------
    function setFieldError(wrapper, textEl, message){
      if(message){
        wrapper.classList.remove("hidden");
        textEl.textContent = message;
        const input = wrapper.previousElementSibling.querySelector("input");
        if(input){
          input.style.boxShadow = "0 0 0 1px rgba(239,68,68,.9)";
          input.style.borderColor = "rgb(239,68,68)";
        }
      } else {
        wrapper.classList.add("hidden");
        textEl.textContent = "";
        const input = wrapper.previousElementSibling.querySelector("input");
        if(input){
          input.style.boxShadow = "";
          input.style.borderColor = "#1f2937"; // reset to gray-800
        }
      }
    }

    function setButtonState(enabled){
      if(isLoading) return;
      if(enabled){
        elBtn.classList.remove("bg-gray-700","text-gray-400","cursor-not-allowed");
        elBtn.classList.add("bg-[color:var(--brand)]","text-black","hover:bg-[color:var(--brand)]/90","hover:shadow-lg","hover:shadow-[color:var(--brand)]/20");
        elBtn.disabled = false;
      } else {
        elBtn.classList.add("bg-gray-700","text-gray-400","cursor-not-allowed");
        elBtn.classList.remove("bg-[color:var(--brand)]","text-black","hover:bg-[color:var(--brand)]/90","hover:shadow-lg","hover:shadow-[color:var(--brand)]/20");
        elBtn.disabled = true;
      }
    }

    function updateFieldUI(field){
      const email = elEmail.value;
      const password = elPass.value;
      const errs = getErrors(email, password);

      if(field === "email" && touched.email){
        setFieldError(elErrEmail, elErrEmailText, errs.email);
      }
      if(field === "password" && touched.password){
        setFieldError(elErrPass, elErrPassText, errs.password);
      }

      const hasErrors = !!(errs.email || errs.password);
      setButtonState(!hasErrors);
    }

    function showError(msg){
      elAlertErrorText.textContent = msg || "Invalid email or password";
      elAlertError.classList.remove("hidden");
    }
    function hideError(){ elAlertError.classList.add("hidden"); }
    function showSuccess(msg){
      elAlertSuccessText.textContent = msg || "Login successful! Redirecting...";
      elAlertSuccess.classList.remove("hidden");
    }
    function hideSuccess(){ elAlertSuccess.classList.add("hidden"); }

    // ---------- Remember Me: load saved state ----------
    (function initRememberMe(){
      if(!STORAGE) return;
      const remembered = STORAGE.getItem(LS_REMEMBER) === "1";
      if(remembered){
        const savedEmail = STORAGE.getItem(LS_EMAIL) || "";
        if(savedEmail){
          elEmail.value = savedEmail;
          touched.email = true;           // prevents initial error for email
          updateFieldUI("email");
        }
        elRemember.checked = true;
        // If email is prefilled, move focus to password
        setTimeout(()=> elPass.focus(), 0);
      } else {
        elRemember.checked = false;
      }
    })();

    // ---------- Listeners ----------
    elEmail.addEventListener("input", ()=>{
      hideError();
      touched.email = true;
      updateFieldUI("email");
      // If user wants to be remembered, keep email in storage as they type
      if(STORAGE && elRemember.checked){
        STORAGE.setItem(LS_EMAIL, elEmail.value.trim().toLowerCase());
      }
    });

    elPass.addEventListener("input", ()=>{ hideError(); touched.password = true; updateFieldUI("password"); });
    elEmail.addEventListener("blur",  ()=>{ touched.email = true; updateFieldUI("email"); });
    elPass .addEventListener("blur",  ()=>{ touched.password = true; updateFieldUI("password"); });

    elTogglePass.addEventListener("click", ()=>{
      showPassword = !showPassword;
      elPass.type = showPassword ? "text" : "password";
      elToggleIcon.setAttribute("icon", showPassword ? "lucide:eye-off" : "lucide:eye");
    });

    elForgot.addEventListener("click", ()=>{ window.location.href="/forgot-password.html"; });

    // Handle remember checkbox toggling immediately
    elRemember.addEventListener("change", ()=>{
      if(!STORAGE) return;
      if(elRemember.checked){
        STORAGE.setItem(LS_REMEMBER, "1");
        STORAGE.setItem(LS_EMAIL, elEmail.value.trim().toLowerCase());
      } else {
        STORAGE.removeItem(LS_REMEMBER);
        STORAGE.removeItem(LS_EMAIL);
      }
    });

    // Initial button state: disabled, with NO errors shown
    setButtonState(false);

    // ---------- AJAX submit (to PHP) ----------
    elForm.addEventListener("submit", async (e)=>{
      e.preventDefault();
      if(isLoading) return;

      hideError(); hideSuccess();

      // Mark both fields as touched on submit to reveal messages if invalid
      touched.email = true;
      touched.password = true;

      const email = elEmail.value.trim();
      const password = elPass.value;
      const errs = getErrors(email, password);

      setFieldError(elErrEmail, elErrEmailText, errs.email);
      setFieldError(elErrPass, elErrPassText, errs.password);

      if (errs.email || errs.password) {
        setButtonState(false);
        return;
      }

      // loading UI
      isLoading = true;
      elBtn.disabled = true;
      elBtnSpinner.classList.remove("hidden");
      elBtnLock.classList.add("hidden");
      elBtnText.textContent = "Signing In...";
      elBtn.classList.add("bg-[color:var(--brand)]/20","border-2","border-[color:var(--brand)]","text-[color:var(--brand)]","scale-105","animate-pulse");

      try {
        const fd = new FormData();
        fd.append("email", email.toLowerCase());
        fd.append("password", password);
        // Send remember preference to backend to extend session lifetime server-side
        fd.append("remember", elRemember.checked ? "1" : "0");

        const res = await fetch(elForm.action, {
          method: "POST",
          body: fd,
          headers: { "X-Requested-With": "XMLHttpRequest" }
          // credentials default to "same-origin" for same-origin requests (cookies included)
        });

        const data = await res.json().catch(()=> ({}));

        if(!res.ok || !data || data.success !== true){
          throw new Error((data && data.message) || "Login failed");
        }

        // Persist email only if "Remember me" is enabled; otherwise clear any stored email
        if(STORAGE){
          if(elRemember.checked){
            STORAGE.setItem(LS_REMEMBER, "1");
            STORAGE.setItem(LS_EMAIL, email.toLowerCase());
          } else {
            STORAGE.removeItem(LS_REMEMBER);
            STORAGE.removeItem(LS_EMAIL);
          }
        }

        showSuccess(data.message || "Login successful! Redirecting...");
        setTimeout(()=>{ window.location.href = data.redirect || "/users"; }, 1200);

      } catch (err){
        showError(err?.message || "Invalid email or password");
      } finally {
        isLoading = false;
        elBtnSpinner.classList.add("hidden");
        elBtnLock.classList.remove("hidden");
        elBtnText.textContent = "Sign In";
        elBtn.classList.remove("scale-105","animate-pulse","border-2","border-[color:var(--brand)]");
        const errs2 = getErrors(elEmail.value, elPass.value);
        setButtonState(!(errs2.email || errs2.password));
      }
    });

    // Enter to submit
    elEmail.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); elForm.requestSubmit(); }});
    elPass .addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); elForm.requestSubmit(); }});
  </script>


</body></html>
