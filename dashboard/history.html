    th, td { white-space: nowrap; }
  </style>

<body class="p-6">
  <div class="max-w-6xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-extrabold">Trade History</h1>
    </div>

    <form method="get" class="surface rounded-xl p-4 flex flex-wrap items-end gap-3">
      <div>
        <label class="block text-xs muted mb-1">Type</label>
        <select name="type" class="bg-black/40 border border-white/20 rounded-lg px-3 py-2">
          <option value="">All</option>
          <option value="buy">Buy</option>
          <option value="sell">Sell</option>
        </select>
      </div>

      <div>
        <label class="block text-xs muted mb-1">Symbol</label>
        <input name="symbol" value="" placeholder="e.g. BTC" class="bg-black/40 border border-white/20 rounded-lg px-3 py-2 uppercase">
      </div>

      <div class="ml-auto flex items-center gap-3">
        <button type="submit" class="px-4 py-2 rounded-lg font-semibold text-black" style="background:linear-gradient(90deg,#FEFD0C,#F5F500)">Filter</button>

        <a href="?download=csv" class="px-4 py-2 rounded-lg font-semibold text-black" style="background:linear-gradient(90deg,#FEFD0C,#F5F500)">
          Download CSV
        </a>
      </div>
    </form>

    <!-- Totals (successful trades only) -->
    <div class="surface rounded-xl p-4 flex flex-wrap items-center justify-between">
      <div>
        <p class="text-sm muted">Total Successful Trades</p>
        <p class="text-lg font-bold">
          USD 0.00 &nbsp;
        </p>
      </div>
      <div class="text-sm muted">
        Showing 0 rows      </div>
    </div>

    <div class="surface rounded-xl p-4 overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-white/15">
                          <th class="text-left py-2 px-3">Order Ref</th>
                          <th class="text-left py-2 px-3">Type</th>
                          <th class="text-left py-2 px-3">Crypto ID</th>
                          <th class="text-left py-2 px-3">Symbol</th>
                          <th class="text-left py-2 px-3">Asset</th>
                          <th class="text-left py-2 px-3">Amount (Crypto)</th>
                          <th class="text-left py-2 px-3">USD Value</th>
                          <th class="text-left py-2 px-3">USD Rate</th>
                          <th class="text-left py-2 px-3">Currency</th>
                          <th class="text-left py-2 px-3">Local Value</th>
                          <th class="text-left py-2 px-3">Local Rate / Coin</th>
                          <th class="text-left py-2 px-3">Country</th>
                          <th class="text-left py-2 px-3">Client Timezone</th>
                          <th class="text-left py-2 px-3">Status</th>
                          <th class="text-left py-2 px-3">Created</th>
                      </tr>
        </thead>
        <tbody>
                      <tr><td colspan="15" class="text-center py-8 text-gray-400">No trades found.</td></tr>
                  </tbody>
      </table>

          </div>
  </div>


</body></html>
