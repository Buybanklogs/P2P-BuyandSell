<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-extrabold">Forgot <span class="text-[color:var(--brand)]">Password</span></h1>
      <p class="text-gray-300 text-sm mt-1">Enter your account email to receive a verification code</p>
    </div>

    <div id="alert" class="hidden mb-4 text-sm p-3 rounded-lg"></div>

    <form id="form" class="space-y-4" novalidate="">
      <div>
        <label class="block text-sm mb-2">Email Address</label>
        <input id="email" type="email" required="" placeholder="you@example.com" class="w-full rounded-xl bg-black/50 border border-white/15 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[color:var(--brand)]/30">
      </div>
      <button id="btn" type="submit" class="w-full py-3 rounded-xl font-semibold bg-[color:var(--brand)] text-black hover:opacity-90 transition">
        Send Code
      </button>
    </form>
  </div>

<script>
const $ = (s)=>document.querySelector(s);
const alertBox = $('#alert');
function showAlert(msg, ok=false){
  alertBox.textContent = msg;
  alertBox.className = ok
    ? 'mb-4 text-sm p-3 rounded-lg bg-green-500/10 border border-green-500/30 text-green-300'
    : 'mb-4 text-sm p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-300';
  alertBox.classList.remove('hidden');
}
$('#form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  alertBox.classList.add('hidden');
  const email = $('#email').value.trim().toLowerCase();
  if(!email){ showAlert('Please enter your email'); return; }
  const btn = $('#btn'); btn.disabled = true; btn.textContent = 'Sending...';
  try{
    const res = await fetch('/auth/forgot-start.php', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if(!res.ok || !data?.success){ throw new Error(data?.message || 'Failed'); }
    showAlert('Code sent! Redirecting...', true);
    setTimeout(()=> location.href = data.redirect, 800);
  }catch(err){
    showAlert(err?.message || 'Failed to send code');
  }finally{
    btn.disabled = false; btn.textContent = 'Send Code';
  }
});
</script>


</body></html>
